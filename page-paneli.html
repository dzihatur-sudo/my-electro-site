<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Светодиодные панели</title>





    
    <style>
        body {
            background-color: #000000;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* ========================================= */
        /*   СЕКЦИЯ 1: ЧЕРНАЯ ПОЛОСКА (ШАПКА)      */
        /* ========================================= */
        .header {
            background-color: #111;
            color: white;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Название компании */
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        /* ===== БЛОК С КНОПКАМИ УСЛУГ ===== */
        .nav-menu {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        /* Одна кнопка меню */
        .nav-link {
            color: #ccc;
            text-decoration: none;
            font-size: 15px;
            padding-bottom: 5px;
            position: relative;
            transition: color 0.3s;
            cursor: pointer;
            white-space: nowrap;
        }

            .nav-link:hover {
                color: #ff5722;
            }

            /* Подчеркивание */
            .nav-link::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                width: 0%;
                height: 2px;
                background-color: #ff5722;
                transition: width 0.4s ease;
            }

            .nav-link:hover::after {
                width: 100%;
            }

        /* Номер телефона */
        .phone {
            font-size: 16px;
            color: #ccc;
            flex-shrink: 0;
        }

        /* Кнопка "Оставить заявку" */
        .btn-request {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            flex-shrink: 0;
        }

            .btn-request:hover {
                background-color: #e64a19;
                transform: scale(1.05);
            }

        /* ===== БУРГЕР-КНОПКА ===== */
        .burger-btn {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 22px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1000;
        }

            .burger-btn span {
                display: block;
                width: 100%;
                height: 3px;
                background-color: white;
                border-radius: 2px;
                transition: 0.3s;
            }

            .burger-btn.active span:nth-child(1) {
                transform: translateY(9px) rotate(45deg);
            }

            .burger-btn.active span:nth-child(2) {
                opacity: 0;
            }

            .burger-btn.active span:nth-child(3) {
                transform: translateY(-9px) rotate(-45deg);
            }

        /* ===== АДАПТИВ: ДЛЯ ПЛАНШЕТОВ И ТЕЛЕФОНОВ ===== */
        @media (max-width: 1000px) {

            .header {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: space-between;
                align-items: center;
                padding: 15px 20px;
            }

            .burger-btn {
                display: flex;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                width: 100%;
                background-color: #111;
                padding: 15px 0;
                order: 3;
            }

                .nav-menu.active {
                    display: flex;
                }

                .nav-menu .nav-link {
                    padding: 12px 20px;
                    border-bottom: 1px solid #333;
                }

            .phone {
                order: 2;
                font-size: 14px;
            }

            .btn-request {
                order: 4;
                width: 100%;
                margin-top: 10px;
            }
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            flex-shrink: 0;
            text-decoration: none; /* ← добавь эту строку */
            color: white; /* ← и эту, чтобы цвет остался белым */
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */

        /* Затемняющий фон */
        .modal-overlay {
            display: none; /* Скрыто по умолчанию */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* Полупрозрачный чёрный */
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

            /* Когда окно открыто */
            .modal-overlay.active {
                display: flex;
            }

        /* Белое окно */
        .modal-window {
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            position: relative;
            animation: modalIn 0.3s ease;
        }

        /* Анимация появления */
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Кнопка закрыть (крестик) */
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 30px;
            cursor: pointer;
            transition: 0.3s;
            line-height: 1;
        }

            .modal-close:hover {
                color: #ff5722;
            }

        /* Заголовок */
        .modal-title {
            color: white;
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        /* Подзаголовок */
        .modal-subtitle {
            color: #999;
            margin: 0 0 25px 0;
            font-size: 14px;
        }

        /* Поля ввода */
        .modal-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 15px;
            background-color: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

            .modal-input:focus {
                outline: none;
                border-color: #ff5722;
            }

        /* Текстовое поле */
        .modal-textarea {
            resize: vertical;
            min-height: 80px;
            font-family: Arial, sans-serif;
        }

        /* Кнопка отправки */
        .modal-submit {
            width: 100%;
            padding: 14px;
            background-color: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

            .modal-submit:hover {
                background-color: #e64a19;
                transform: scale(1.02);
            }

        /* Сообщение об успехе (изначально скрыто) */
        .modal-success {
            display: none;
            text-align: center;
            color: white;
        }

            .modal-success.active {
                display: block;
            }

            .modal-success h2 {
                margin-bottom: 10px;
            }

        .modal-form.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <div class="header">

        <a href="index.html" class="logo">ELECTRO-LED</a>

        <button class="burger-btn" id="burgerBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="nav-menu" id="navMenu">
            <a class="nav-link" href="index.html">Главная</a>
            <a class="nav-link" href="page-paneli.html">Светодиодные панели</a>
            <a class="nav-link" href="page-montazh.html">Электромонтажные работы</a>
            <a class="nav-link" href="page-remont.html">Ремонт и диагностика</a>
        </div>

        <div class="phone">+7 (922) XXX-XX-XX</div>

        <button class="btn-request">Оставить заявку</button>

    </div>
    <!-- ===== МОДАЛЬНОЕ ОКНО (ЗАЯВКА) ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-window">

            <!-- Кнопка закрыть (крестик) -->
            <button class="modal-close" id="modalClose">&times;</button>

            <!-- Заголовок -->
            <h2 class="modal-title">Оставить заявку</h2>
            <p class="modal-subtitle">Заполните форму, и мы перезвоним вам в течение 15 минут</p>

            <!-- Форма -->
            <form class="modal-form" id="requestForm">

                <input type="text"
                       class="modal-input"
                       placeholder="Ваше имя"
                       id="nameInput"
                       required>

                <input type="tel"
                       class="modal-input"
                       placeholder="+7 (___) ___-__-__"
                       id="phoneInput"
                       required>

                <textarea class="modal-input modal-textarea"
                          placeholder="Ваш вопрос (необязательно)"
                          id="questionInput"
                          rows="3"></textarea>

                <button type="submit" class="modal-submit">Отправить заявку</button>

            </form>

            <!-- Сообщение об успехе (изначально скрыто) -->
            <div class="modal-success" id="modalSuccess">
                <h2>✅ Заявка отправлена!</h2>
                <p>Мы перезвоним вам в ближайшее время.</p>
            </div>

        </div>
    </div>
    <!-- ========================================= -->
    <!--   МЕСТО ДЛЯ ТВОЕГО КОНТЕНТА            -->
    <!--   (тут будешь вставлять новые секции)   -->
    <!-- ========================================= -->
    <!-- ===== СКРИПТЫ ===== -->
    <script>
    // Бургер-меню
    const burgerBtn = document.getElementById('burgerBtn');
    const navMenu = document.getElementById('navMenu');
    if (burgerBtn) {
        burgerBtn.addEventListener('click', function () {
            burgerBtn.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
    }

    // ===== МОДАЛЬНОЕ ОКНО =====
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const btnRequest = document.querySelector('.btn-request');
    const requestForm = document.getElementById('requestForm');
    const modalSuccess = document.getElementById('modalSuccess');

    // Открыть окно по кнопке "Оставить заявку"
    if (btnRequest) {
        btnRequest.addEventListener('click', function () {
            modalOverlay.classList.add('active');
        });
    }

    // Закрыть окно по крестику
    if (modalClose) {
        modalClose.addEventListener('click', function () {
            modalOverlay.classList.remove('active');
        });
    }

    // Закрыть окно при клике на фон
    if (modalOverlay) {
        modalOverlay.addEventListener('click', function (e) {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });
    }

    // Отправка формы
    if (requestForm) {
        requestForm.addEventListener('submit', function (e) {
            e.preventDefault();

            const name = document.getElementById('nameInput').value;
            const phone = document.getElementById('phoneInput').value;
            const question = document.getElementById('questionInput').value || 'Не указан';

            const scriptURL = 'https://script.google.com/macros/s/AKfycbwkJpHARe92lpvDJPG9bq8n9RwT6Zq6rm8vSOgomHnzL50oRoIOH0RsfcvSLpbJZW9h/exec';

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: name,
                    phone: phone,
                    question: question
                })
            })
            .then(() => {
                requestForm.classList.add('hidden');
                modalSuccess.classList.add('active');
                setTimeout(() => {
                    modalOverlay.classList.remove('active');
                    requestForm.classList.remove('hidden');
                    modalSuccess.classList.remove('active');
                    requestForm.reset();
                }, 3000);
            })
            .catch(() => {
                alert('Ошибка отправки. Пожалуйста, позвоните нам по телефону.');
            });
        });
    }
</script>


</body>
</html>
